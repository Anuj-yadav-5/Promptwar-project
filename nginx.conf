server {
    listen       8080;
    server_name  localhost;

    # Enable gzip compression for faster delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # No cache for HTML (ensures fresh SPA shell on deploy)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long-term cache for hashed assets (JS/CSS bundles — filenames change on rebuild)
    location ~* \.(?:js|css|woff2?|ico|png|svg|webp)$ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Error handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

